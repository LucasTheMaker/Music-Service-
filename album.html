<!DOCTYPE html>
<html>
<head>
  <title>Album</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="album-page"></div>

  <script src="albums.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const album = window.albums.find(a => a.id === id);

    const container = document.getElementById("album-page");

    container.innerHTML = `
      <h1>${album.title}</h1>
      <p>${album.artist}</p>

      ${album.tracks.map(t => `
        <div>${t.number}. ${t.title}</div>
      `).join("")}
    `;
  </script>

</body>
</html>
