<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <div class="main">

    <h1 class="home-title">Home</h1>

    <!-- ARTIST (TOP PICKS REPLACEMENT) -->
    <h2 class="section-title">Artist</h2>
    <div class="horizontal-scroll" id="artistRow"></div>

    <!-- ALBUMS (RECENTLY PLAYED REPLACEMENT) -->
    <h2 class="section-title">Albums</h2>
    <div class="horizontal-scroll" id="albumRow"></div>

    <!-- TRACK VIEW -->
    <div id="trackView" style="display:none;"></div>

  </div>

</div>

<!-- PLAYER -->
<div class="player">

  <div>
    <div id="trackName">Nothing Playing</div>
    <div id="subText">Ready</div>
  </div>

  <div class="controls">
    <button id="prev">⏮</button>
    <button id="play">▶</button>
    <button id="next">⏭</button>
  </div>

  <input id="volume" type="range" min="0" max="1" step="0.01">

</div>

<audio id="audio"></audio>

<script src="app.js"></script>
</body>
</html>
