<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="app"></div>

  <!-- MINI PLAYER -->
  <div id="player">

  <script src="albums.js"></script>
  <script src="app.js"></script>

</body>
</html>
