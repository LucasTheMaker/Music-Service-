<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Service</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <input id="search" placeholder="Search songs...">
  </div>

  <div id="main"></div>

  <div class="player">
    <div>
      <div id="trackName">Not playing</div>
      <div id="subText"></div>
    </div>

    <div>
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
    </div>

    <input id="volume" type="range" min="0" max="1" step="0.01">
  </div>

  <audio id="audio"></audio>

  <script src="app.js"></script>
</body>
</html>
