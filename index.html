<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Service</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <input id="search" placeholder="Search songs...">
    <button id="themeToggle">Theme</button>
  </div>

  <!-- MAIN APP -->
  <div class="main" id="main"></div>

  <!-- PLAYER -->
  <div class="player">
    <div>
      <div id="trackName">Not playing</div>
      <div id="subText"></div>
    </div>

    <div>
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
    </div>

    <input id="volume" type="range" min="0" max="1" step="0.01">
  </div>

  <!-- AUDIO -->
  <audio id="audio"></audio>

  <script src="app.js"></script>
</body>
</html>
