<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<input id="search-input" placeholder="Search music...">
</nav>

<main>
<div id="app"></div>
</main>

<footer class="player-bar">

  <!-- LEFT: COVER + TEXT -->
  <div class="now-playing-left">
    <img id="player-cover" src="" />

    <div class="now-playing-text">
      <div id="player-track-title" class="title">Nothing Playing</div>
      <div id="player-track-artist" class="artist">Select a song</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()" id="play-btn">▶</button>
    <button onclick="nextSong()">⏭</button>
  </div>

</footer>

<script src="app.js"></script>
</body>
</html>
